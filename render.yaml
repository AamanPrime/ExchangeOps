databases:
  - name: exchangeops-db
    databaseName: exchangeops
    user: admin
    plan: free

services:
  # 1. Simulator Service
  - type: web
    name: exchangeops-simulator
    env: python
    plan: free
    buildCommand: "cd simulator && pip install -r requirements.txt"
    startCommand: "cd simulator && python simulator.py"
    envVars:
      - key: SIMULATOR_PORT
        value: 10000

  # 2. Django Backend & Background Poller (Combined for Free Tier)
  - type: web
    name: exchangeops-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    # We use a subshell to run the poller in the background and Daphne in the foreground
    startCommand: "cd backend && (python manage.py poll_exchanges &) && daphne -b 0.0.0.0 -p $PORT exchangeops_backend.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exchangeops-db
          property: connectionString
      - key: SIMULATOR_URL
        value: "https://exchangeops-simulator.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
