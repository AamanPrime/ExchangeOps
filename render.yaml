databases:
  - name: exchangeops-db
    databaseName: exchangeops
    user: admin

services:
  # 1. Simulator Service
  - type: web
    name: exchangeops-simulator
    env: python
    buildCommand: "cd simulator && pip install -r requirements.txt"
    startCommand: "cd simulator && python simulator.py"
    envVars:
      - key: SIMULATOR_PORT
        value: 10000

  # 2. Django Backend
  - type: web
    name: exchangeops-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd backend && daphne -b 0.0.0.0 -p $PORT exchangeops_backend.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exchangeops-db
          property: connectionString
      - key: SIMULATOR_URL
        value: "https://exchangeops-simulator.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Note: In production, limit this to your Vercel URL and Render URL

  # 3. Backend Poller Worker
  - type: worker
    name: exchangeops-poller
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python manage.py poll_exchanges"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exchangeops-db
          property: connectionString
      - key: SIMULATOR_URL
        value: "https://exchangeops-simulator.onrender.com"
