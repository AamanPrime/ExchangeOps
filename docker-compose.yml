version: '3.8'

services:
  db:
    image: postgres:15
    container_name: exchangeops-db
    environment:
      POSTGRES_DB: exchangeops
      POSTGRES_USER: exchangeops
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
